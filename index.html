<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로또 번호 추첨기</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    /* colors */
    --primary: #cc785c;
    --primary-active: #a9583e;
    --primary-disabled: #e6dfd8;
    --ink: #141413;
    --body: #3d3d3a;
    --body-strong: #252523;
    --muted: #6c6a64;
    --muted-soft: #8e8b82;
    --hairline: #e6dfd8;
    --hairline-soft: #ebe6df;
    --canvas: #faf9f5;
    --surface-soft: #f5f0e8;
    --surface-card: #efe9de;
    --surface-cream-strong: #e8e0d2;
    --surface-dark: #181715;
    --surface-dark-elevated: #252320;
    --surface-dark-soft: #1f1e1b;
    --on-primary: #ffffff;
    --on-dark: #faf9f5;
    --on-dark-soft: #a09d96;
    --accent-teal: #5db8a6;
    --accent-amber: #e8a55a;
    --success: #5db872;
    --error: #c64545;

    /* typography */
    --font-display: "Cormorant Garamond", "Tiempos Headline", Garamond, serif;
    --font-body: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;

    /* radius */
    --r-md: 8px;
    --r-lg: 12px;
    --r-xl: 16px;
    --r-pill: 9999px;

    /* spacing */
    --sp-xs: 8px;
    --sp-sm: 12px;
    --sp-md: 16px;
    --sp-lg: 24px;
    --sp-xl: 32px;
    --sp-xxl: 48px;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: var(--sp-lg);
    font-family: var(--font-body);
    background: var(--canvas);
    color: var(--ink);
  }

  .page {
    width: 460px;
    max-width: 100%;
  }

  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--surface-card);
    color: var(--ink);
    font-family: var(--font-body);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: var(--r-pill);
    margin-bottom: var(--sp-md);
  }

  h1 {
    font-family: var(--font-display);
    font-weight: 500;
    font-size: 40px;
    line-height: 1.15;
    letter-spacing: -0.5px;
    margin: 0 0 8px;
    color: var(--ink);
  }

  p.sub {
    font-family: var(--font-body);
    font-size: 16px;
    line-height: 1.55;
    color: var(--body);
    margin: 0 0 var(--sp-xl);
  }

  /* dark product-mockup card housing the draw */
  .draw-card {
    background: var(--surface-dark);
    border-radius: var(--r-lg);
    padding: var(--sp-xl);
    margin-bottom: var(--sp-lg);
  }

  .draw-label {
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 500;
    color: var(--on-dark-soft);
    margin-bottom: var(--sp-md);
  }

  .balls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
    min-height: 56px;
    margin-bottom: var(--sp-md);
  }

  .plus {
    font-family: var(--font-display);
    font-size: 22px;
    color: var(--on-dark-soft);
    visibility: hidden;
  }

  .bonus-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    min-height: 56px;
    margin-bottom: var(--sp-xs);
  }

  .bonus-label {
    text-align: center;
    font-family: var(--font-body);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--on-dark-soft);
    margin-bottom: var(--sp-xl);
    visibility: hidden;
  }

  .bonus-label.show { visibility: visible; }

  .ball {
    width: 52px;
    height: 52px;
    border-radius: var(--r-pill);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-body);
    font-weight: 500;
    font-size: 18px;
    color: var(--on-primary);
    background: var(--surface-dark-elevated);
    border: 1px dashed var(--on-dark-soft);
  }

  .ball.rolling {
    border: none;
    animation: shake 0.09s linear infinite;
  }

  .ball.settle {
    border: none;
    animation: pop 0.32s cubic-bezier(.34,1.56,.64,1);
  }

  .ball.bonus-ring {
    box-shadow: 0 0 0 3px var(--surface-dark), 0 0 0 5px var(--on-dark-soft);
  }

  @keyframes pop {
    from { transform: scale(1.25); }
    to { transform: scale(1); }
  }

  @keyframes shake {
    0% { transform: translateY(0); }
    50% { transform: translateY(-2px); }
    100% { transform: translateY(0); }
  }

  .b1 { background: var(--primary); }
  .b2 { background: var(--accent-teal); }
  .b3 { background: var(--accent-amber); }
  .b4 { background: var(--muted); }
  .b5 { background: var(--success); }

  .btn-primary {
    display: block;
    width: 100%;
    background: var(--primary);
    color: var(--on-primary);
    border: none;
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 500;
    padding: 12px 20px;
    height: 44px;
    border-radius: var(--r-md);
    cursor: pointer;
    transition: background-color 0.15s;
  }

  .btn-primary:hover { background: var(--primary-active); }
  .btn-primary:disabled {
    background: var(--primary-disabled);
    color: var(--muted);
    cursor: default;
  }

  /* saju form card — light cream, alternates against the dark draw-card */
  .saju-card {
    background: var(--surface-card);
    border-radius: var(--r-lg);
    padding: var(--sp-xl);
    margin-bottom: var(--sp-lg);
  }

  .saju-card h2 {
    font-family: var(--font-display);
    font-weight: 500;
    font-size: 24px;
    letter-spacing: -0.3px;
    margin: 0 0 4px;
    color: var(--ink);
  }

  .saju-card .sub {
    margin: 0 0 var(--sp-lg);
    font-size: 14px;
  }

  .field { margin-bottom: var(--sp-md); }

  .field label {
    display: block;
    font-family: var(--font-body);
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .field input[type="date"],
  .field input[type="time"],
  .field select {
    width: 100%;
    background: var(--canvas);
    color: var(--ink);
    border: 1px solid var(--hairline);
    border-radius: var(--r-md);
    padding: 10px 14px;
    height: 40px;
    font-family: var(--font-body);
    font-size: 14px;
  }

  .field input:disabled { color: var(--muted-soft); }

  .field input:focus, .field select:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(204, 120, 92, 0.15);
  }

  .checkbox-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--muted);
    margin: -6px 0 var(--sp-md);
  }

  .two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: var(--sp-md);
  }

  .saju-disclaimer {
    font-size: 12px;
    color: var(--muted-soft);
    margin-top: var(--sp-sm);
    text-align: center;
  }

  .saju-result { margin-top: var(--sp-lg); }

  .saju-loading, .saju-error {
    font-family: var(--font-body);
    font-size: 14px;
    padding: 12px 0;
  }

  .saju-loading { color: var(--muted); }
  .saju-error { color: var(--error); }

  .saju-summary {
    background: var(--canvas);
    border: 1px solid var(--hairline);
    border-radius: var(--r-lg);
    padding: var(--sp-lg);
  }

  .saju-summary-title {
    font-family: var(--font-body);
    font-weight: 500;
    font-size: 12px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .saju-summary p {
    font-size: 14px;
    line-height: 1.55;
    color: var(--body);
    margin: 0 0 8px;
  }

  .saju-summary p:last-child { margin-bottom: 0; }

  .saju-numbers-card {
    background: var(--surface-dark);
    border-radius: var(--r-lg);
    padding: var(--sp-xl);
    margin-top: var(--sp-md);
  }

  .history-tag {
    background: var(--accent-teal);
    color: var(--on-primary);
    font-family: var(--font-body);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    padding: 2px 6px;
    border-radius: var(--r-pill);
    margin-right: 4px;
    flex-shrink: 0;
  }

  .history {
    border-top: 1px solid var(--hairline);
    margin-top: var(--sp-lg);
    padding-top: var(--sp-sm);
    max-height: 180px;
    overflow-y: auto;
  }

  .history-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 0;
    border-bottom: 1px solid var(--hairline-soft);
  }

  .history-item .idx {
    font-family: var(--font-body);
    font-size: 13px;
    color: var(--muted-soft);
    width: 26px;
    flex-shrink: 0;
  }

  .mini {
    width: 22px;
    height: 22px;
    border-radius: var(--r-pill);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-body);
    font-size: 11px;
    font-weight: 500;
    color: var(--on-primary);
  }
</style>
</head>
<body>
  <div class="page">
    <span class="eyebrow">Lotto Draw</span>
    <h1>로또 번호 추첨기</h1>
    <p class="sub">1부터 45까지, 서로 다른 6개의 번호를 뽑아드려요.</p>

    <div class="draw-card">
      <div class="draw-label">이번 회차 추첨 결과</div>
      <div class="balls" id="balls"></div>
      <div class="plus" id="plus">+</div>
      <div class="bonus-row" id="bonusRow"></div>
      <div class="bonus-label" id="bonusLabel">보너스 번호</div>
      <button id="drawBtn" class="btn-primary">번호 추첨하기</button>
    </div>

    <div class="saju-card">
      <span class="eyebrow">AI Saju</span>
      <h2>사주로 번호 추천받기</h2>
      <p class="sub">생년월일과 태어난 시간을 입력하면 AI가 사주를 풀이해 번호를 추천해드려요.</p>

      <form id="sajuForm">
        <div class="two-col">
          <div class="field">
            <label for="birthDate">생년월일</label>
            <input type="date" id="birthDate" required>
          </div>
          <div class="field">
            <label for="birthTime">태어난 시간</label>
            <input type="time" id="birthTime">
          </div>
        </div>

        <label class="checkbox-row">
          <input type="checkbox" id="timeUnknown"> 태어난 시간을 몰라요
        </label>

        <div class="two-col">
          <div class="field">
            <label for="calendarType">양력 / 음력</label>
            <select id="calendarType">
              <option value="solar">양력</option>
              <option value="lunar">음력</option>
            </select>
          </div>
          <div class="field">
            <label for="gender">성별 (선택)</label>
            <select id="gender">
              <option value="">선택 안 함</option>
              <option value="male">남성</option>
              <option value="female">여성</option>
            </select>
          </div>
        </div>

        <button type="submit" id="sajuBtn" class="btn-primary">사주 분석하고 번호 받기</button>
        <p class="saju-disclaimer">⚠ AI가 추정한 사주 풀이로, 재미로 즐기는 콘텐츠입니다.</p>
      </form>

      <div class="saju-result" id="sajuResult"></div>
    </div>

    <div class="history" id="history"></div>
  </div>

<script>
  const ballsEl = document.getElementById('balls');
  const plusEl = document.getElementById('plus');
  const bonusRowEl = document.getElementById('bonusRow');
  const bonusLabelEl = document.getElementById('bonusLabel');
  const drawBtn = document.getElementById('drawBtn');
  const historyEl = document.getElementById('history');
  let round = 0;
  let drawing = false;

  function colorClass(n) {
    if (n <= 10) return 'b1';
    if (n <= 20) return 'b2';
    if (n <= 30) return 'b3';
    if (n <= 40) return 'b4';
    return 'b5';
  }

  function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
  }

  // 7개(본번호 6 + 보너스 1)를 한 번의 추첨 풀에서 서로 다르게 뽑는다
  function drawSeven() {
    const pool = Array.from({ length: 45 }, (_, i) => i + 1);
    const picked = [];
    for (let i = 0; i < 7; i++) {
      const idx = Math.floor(Math.random() * pool.length);
      picked.push(pool[idx]);
      pool.splice(idx, 1);
    }
    return { main: picked.slice(0, 6), bonus: picked[6] };
  }

  function createEmptySlot(container) {
    const div = document.createElement('div');
    div.className = 'ball';
    container.appendChild(div);
    return div;
  }

  // 추첨 기계처럼 숫자가 빠르게 굴러가다 서서히 멈추며 확정된다
  async function rollBall(el, finalNum, isBonus) {
    el.classList.add('rolling');
    const spins = 14;
    for (let i = 0; i < spins; i++) {
      const r = Math.floor(Math.random() * 45) + 1;
      el.textContent = r;
      el.className = `ball rolling ${colorClass(r)}${isBonus ? ' bonus-ring' : ''}`;
      await sleep(50 + i * 8); // 점점 느려지며 멈추는 느낌
    }
    el.textContent = finalNum;
    el.className = `ball settle ${colorClass(finalNum)}${isBonus ? ' bonus-ring' : ''}`;
    await sleep(180);
  }

  async function playDraw() {
    if (drawing) return;
    drawing = true;
    drawBtn.disabled = true;
    drawBtn.textContent = '추첨 중...';

    ballsEl.innerHTML = '';
    bonusRowEl.innerHTML = '';
    plusEl.style.visibility = 'hidden';
    bonusLabelEl.classList.remove('show');

    const { main, bonus } = drawSeven();

    const slots = main.map(() => createEmptySlot(ballsEl));
    for (let i = 0; i < 6; i++) {
      await rollBall(slots[i], main[i], false);
    }

    plusEl.style.visibility = 'visible';
    bonusLabelEl.classList.add('show');
    const bonusSlot = createEmptySlot(bonusRowEl);
    await rollBall(bonusSlot, bonus, true);

    addHistory(main.slice().sort((a, b) => a - b), bonus);

    drawBtn.disabled = false;
    drawBtn.textContent = '번호 추첨하기';
    drawing = false;
  }

  function addHistory(numbers, bonus, source) {
    round++;
    const row = document.createElement('div');
    row.className = 'history-item';
    const tag = source === 'ai' ? '<span class="history-tag">AI 사주</span>' : '';
    row.innerHTML = `<span class="idx">#${round}</span>` + tag +
      numbers.map(n => `<span class="mini ${colorClass(n)}">${n}</span>`).join('') +
      `<span style="color:var(--muted-soft);font-size:12px;margin:0 2px;">+</span>` +
      `<span class="mini ${colorClass(bonus)}" style="box-shadow:0 0 0 2px var(--canvas),0 0 0 3px var(--muted-soft);">${bonus}</span>`;
    historyEl.prepend(row);
  }

  drawBtn.addEventListener('click', playDraw);

  playDraw();

  // ---- AI 사주 분석 & 추천 ----
  const sajuForm = document.getElementById('sajuForm');
  const sajuBtn = document.getElementById('sajuBtn');
  const sajuResult = document.getElementById('sajuResult');
  const timeUnknown = document.getElementById('timeUnknown');
  const birthTimeInput = document.getElementById('birthTime');

  timeUnknown.addEventListener('change', () => {
    birthTimeInput.disabled = timeUnknown.checked;
    if (timeUnknown.checked) birthTimeInput.value = '';
  });

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str == null ? '' : str;
    return div.innerHTML;
  }

  function isValidLottoSet(mainNumbers, bonusNumber) {
    if (!Array.isArray(mainNumbers) || mainNumbers.length !== 6) return false;
    const inRange = n => Number.isInteger(n) && n >= 1 && n <= 45;
    if (!mainNumbers.every(inRange) || !inRange(bonusNumber)) return false;
    const unique = new Set(mainNumbers);
    if (unique.size !== 6 || unique.has(bonusNumber)) return false;
    return true;
  }

  async function renderSajuResult(data) {
    sajuResult.innerHTML = `
      <div class="saju-summary">
        <div class="saju-summary-title">사주 풀이</div>
        <p>${escapeHtml(data.summary)}</p>
        ${data.reasoning ? `<p>${escapeHtml(data.reasoning)}</p>` : ''}
      </div>
      <div class="saju-numbers-card">
        <div class="draw-label">사주 기반 추천 번호</div>
        <div class="balls" id="sajuBalls"></div>
        <div class="plus" id="sajuPlus" style="visibility:visible;">+</div>
        <div class="bonus-row" id="sajuBonusRow"></div>
        <div class="bonus-label show">보너스 번호</div>
      </div>
    `;

    const sajuBallsEl = document.getElementById('sajuBalls');
    const sajuBonusRowEl = document.getElementById('sajuBonusRow');

    const slots = data.mainNumbers.map(() => createEmptySlot(sajuBallsEl));
    for (let i = 0; i < slots.length; i++) {
      await rollBall(slots[i], data.mainNumbers[i], false);
    }
    const bonusSlot = createEmptySlot(sajuBonusRowEl);
    await rollBall(bonusSlot, data.bonusNumber, true);

    addHistory(data.mainNumbers.slice().sort((a, b) => a - b), data.bonusNumber, 'ai');
  }

  sajuForm.addEventListener('submit', async (e) => {
    e.preventDefault();

    const birthDate = document.getElementById('birthDate').value;
    if (!birthDate) return;
    const birthTime = timeUnknown.checked ? null : (birthTimeInput.value || null);
    const calendarType = document.getElementById('calendarType').value;
    const gender = document.getElementById('gender').value || null;

    sajuBtn.disabled = true;
    sajuBtn.textContent = '사주 분석 중...';
    sajuResult.innerHTML = `<div class="saju-loading">AI가 사주를 풀이하고 있어요...</div>`;

    try {
      const res = await fetch('/api/saju', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ birthDate, birthTime, calendarType, gender })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || '분석에 실패했어요.');
      if (!isValidLottoSet(data.mainNumbers, data.bonusNumber)) {
        throw new Error('AI 응답을 해석하지 못했어요. 다시 시도해주세요.');
      }
      await renderSajuResult(data);
    } catch (err) {
      sajuResult.innerHTML = `<div class="saju-error">${escapeHtml(err.message || '오류가 발생했어요. 잠시 후 다시 시도해주세요.')}</div>`;
    } finally {
      sajuBtn.disabled = false;
      sajuBtn.textContent = '사주 분석하고 번호 받기';
    }
  });
</script>
</body>
</html>
